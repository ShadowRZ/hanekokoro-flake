<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <alias binding="strong">
    <family>-apple-system</family>
    <prefer>
      <family>sans-serif</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>BlinkMacSystemFont</family>
    <prefer>
      <family>sans-serif</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>Microsoft Sans Serif</family>
    <prefer>
      <family>sans-serif</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>Microsoft YaHei</family>
    <prefer>
      <family>sans-serif</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>Apple Color Emoji</family>
    <prefer>
      <family>emoji</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>system-ui</family>
    <prefer>
      <family>sans-serif</family>
    </prefer>
  </alias>

  <!-- Add Sarasa Mono SC for Iosevka based fonts -->
  <match target="pattern">
    <test name="family" compare="contains">
      <string>Iosevka</string>
    </test>
    <edit binding="strong" mode="append" name="family">
      <string>Sarasa Mono SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any">
      <string>Hanekokoro Mono</string>
    </test>
    <edit binding="strong" mode="append" name="family">
      <string>Sarasa Mono SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any">
      <string>Hanekokoro Mono-E</string>
    </test>
    <edit binding="strong" mode="append" name="family">
      <string>Sarasa Mono SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any">
      <string>Hanekokoro Mono-K</string>
    </test>
    <edit binding="strong" mode="append" name="family">
      <string>Sarasa Mono SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any">
      <string>Hanekokoro Sans</string>
    </test>
    <edit binding="strong" mode="append" name="family">
      <string>Sarasa Mono SC</string>
    </edit>
  </match>
</fontconfig>
